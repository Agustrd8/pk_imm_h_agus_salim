<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Love Website</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="rain" id="rain"></div>

<div class="page active" id="page1">
    <h1>Masukkan Sandi 💖</h1>

    <input type="password" id="password" placeholder="Masukkan sandi">

    <button onclick="checkPassword()">Masuk</button>
</div>

<div class="page" id="page2">
    <h1>kamu sayang aku? 🥺</h1>

    <div>
        <button id="moveBtn1">iyaa</button>
        <button onclick="nextPage(3)">iyaa bangett</button>
    </div>
</div>

<div class="page" id="page3">
    <h1>apa yang membuat kamu suka aku? 😆</h1>

    <div>
        <button id="moveBtn2">ganteng</button>
        <button onclick="nextPage(4)">ganteng bangett</button>
    </div>
</div>

<div class="page" id="page4">
    <div class="final-text">
        i love youu sayanggg kuuuu fitaa 💖
    </div>
</div>

<script>

function checkPassword(){
    const pass = document.getElementById("password").value;

    if(pass === "SAYANG"){
        nextPage(2);
    }else{
        alert("Sandi salah 😭");
    }
}

function nextPage(pageNumber){
    document.querySelectorAll(".page").forEach(page=>{
        page.classList.remove("active");
    });

    document.getElementById("page"+pageNumber).classList.add("active");
}

function moveButton(btnId){
    const btn = document.getElementById(btnId);

    btn.addEventListener("mouseover", ()=>{

        const x = Math.random() * (window.innerWidth - 150);
        const y = Math.random() * (window.innerHeight - 100);

        btn.style.position = "absolute";
        btn.style.left = x + "px";
        btn.style.top = y + "px";
    });
}

moveButton("moveBtn1");
moveButton("moveBtn2");


const rain = document.getElementById("rain");

const photos = [
    "foto 1.jpg",
    "foto 2.jpg"
];

for(let i=0; i<30; i++){

    const img = document.createElement("img");

    img.src = photos[Math.floor(Math.random()*photos.length)];

    img.style.left = Math.random()*100 + "vw";

    img.style.animationDuration = (5 + Math.random()*5) + "s";

    img.style.animationDelay = Math.random()*5 + "s";

    img.style.width = (60 + Math.random()*40) + "px";
    img.style.height = img.style.width;

    rain.appendChild(img);
}
</script>

</body>
</html>
